version: 2

updates:
  # ── Frontend (npm) ──────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    # Group minor + patch updates together to reduce PR noise
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
      tailwind-shadcn:
        patterns:
          - "tailwindcss"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@testing-library/*"
      eslint-toolchain:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"

  # ── Python scripts (pip / uv) ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "scripts"
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
