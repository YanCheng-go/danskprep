name: Bug Report
description: Report a bug or incorrect behaviour
labels: ["type:bug"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: "Use format: BL-NNN: Short description"
      placeholder: "BL-040: Quiz shows wrong answer for cloze exercises"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:ui
        - area:quiz
        - area:vocabulary
        - area:grammar
        - area:srs
        - area:auth
        - area:db
        - area:dx
        - area:scraping
        - area:analytics
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - p0 — critical / blocks users
        - p1 — important / should fix soon
        - p2 — default
        - p3 — nice to have
      default: 2
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options:
        - xs — one-liner / trivial
        - s — small / straightforward
        - m — medium (default)
        - l — complex / multiple files
        - xl — epic / multi-session
      default: 2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: |
        **Steps to reproduce:**
        1. Go to /quiz
        2. Start a cloze exercise
        3. Type the correct answer

        **Expected:** Shows "Correct!"
        **Actual:** Shows "Incorrect" even though the answer matches
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Affected files (optional)
      description: List files you think are involved
      placeholder: "src/lib/answer-check.ts, src/components/quiz/Cloze.tsx"
